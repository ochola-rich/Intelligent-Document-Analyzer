databases:
  - name: ida-postgres
    databaseName: filesanalyzer_db
    plan: free
    region: frankfurt
    postgresMajorVersion: "16"

services:
  - type: web
    name: ida-ml-service
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./ml-service
    dockerfilePath: ./ml-service/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ida-postgres
          property: connectionString
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: INGEST_WORKERS
        value: "1"

  - type: web
    name: ida-api-gateway
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: ./Api-Gateway
    dockerfilePath: ./Api-Gateway/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: WORD_SERVICE_URL
        value: http://ida-ml-service:10000/upload
      - key: PDF_SERVICE_URL
        value: http://ida-ml-service:10000/upload
      - key: SEARCH_SERVICE_URL
        value: http://ida-ml-service:10000/search
      - key: JOB_SERVICE_BASE_URL
        value: http://ida-ml-service:10000

  - type: web
    name: ida-frontend
    runtime: static
    rootDir: ./frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        fromService:
          type: web
          name: ida-api-gateway
          property: url
